name: Update .upptimerc.yml

# Regenerates the `sites:` list of .upptimerc.yml from the public Tezos node
# sources (teztnets.com, taquito rpc_nodes.json, and the tezos-facts merged
# feed). Each source is fetched independently and the results are merged and
# deduplicated by scripts/update_sites.sh; only the block between the
# BEGIN/END markers in .upptimerc.yml is rewritten.
#
# CI cost: a single ~30s job per day (shallow checkout + 3 curls + jq).
# timeout-minutes bounds the worst case far below the 6h GitHub default,
# and the bot commit deliberately uses github.token, which does NOT trigger
# the push-driven Setup CI — the scheduled Upptime workflows read
# .upptimerc.yml at runtime anyway, so no cascading CI is needed.

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight
  workflow_dispatch: # Allows manual triggering

permissions:
  contents: write

concurrency:
  group: update-upptimerc
  cancel-in-progress: false

jobs:
  update-upptimerc:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Regenerate sites list
      run: ./scripts/update_sites.sh

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add .upptimerc.yml
        git diff-index --quiet HEAD || git commit -m 'Update .upptimerc.yml from public Tezos node sources'
        git push || echo "No changes to push"
